{% extends 'accounts/main.html' %}
{% load static %}
{% block content %}

<main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-4">
  <div class="row">
	<div class="col-sm-3">	
		<div class="card card-body">
			<h4>Delete User?</h4><br>
			<fieldset disabled>
				<label>Name:</label>
				<p>{{user.name}}</p>
				<label>Email:</label>
				<p>{{user.email}}</p>
			</fieldset>
			<form action="" method="POST">
				{% csrf_token %}
				<input type="submit" class="btn btn-block btn-danger" value="Delete">
			</form>
			<hr>
			<a class="btn btn-block btn-info" href="{% url 'users'%}">Cancel</a>
		</div>
	</div>
  </div>
</main>



{% endblock %}
