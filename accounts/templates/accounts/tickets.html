{% extends 'accounts/main.html' %}
{% load static %}
{% block content %}

<main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-4">
  <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Tickets</h1>
    <a href="{% url 'create_ticket'%}" class="btn btn-success" role="button" aria-disabled="true">Add New</a>
  </div>
  <div class="table-responsive">
    <table class="table table-striped table-sm">
      <thead>
        <tr>
          <th>#</th>
          <th>User</th>
          <th>Description</th>
          <th>Status</th>
          <th>Update</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody>
        {% for ticket in tickets %}
        <tr>
          <td>{{ticket.id}}</td>
          <td>{{ticket.user}}</td>
          <td>{{ticket.description}}</td>
          <td>{{ticket.status}}</td>
          <td><a class="btn btn-sm btn-warning" href="{% url 'update_ticket' ticket.id %}">Update</a></td>
          <td><a class="btn btn-sm btn-danger" href="{% url 'delete_ticket' ticket.id %}">Delete</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</main>

{% endblock content %}
