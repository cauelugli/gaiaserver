{% extends 'accounts/main.html' %}
{% load static %}
{% block content %}

<main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-4">
  <div class="row">
	<div class="col-sm-3">	
		<div class="card card-body">
			<h3>Create Ticket</h3><br>
			<form action="" method="POST">
				{% csrf_token %}
				<label>User:</label>
				<p>{{form.user}} <a href="{% url 'create_user'%}" class="btn-xs btn-success" role="button" aria-disabled="true">+</a></p>
				<label>Description:</label>
				<p>{{form.description}}</p>
				<label>Status:</label>
				<p>{{form.status}}</p><br>
				<input type="submit" class="btn btn-block btn-success" value="Create">
			</form>
		</div>
	</div>
  </div>
</main>



{% endblock %}
